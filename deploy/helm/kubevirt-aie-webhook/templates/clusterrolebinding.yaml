apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubevirt-aie-webhook.fullname" . }}
  labels:
    {{- include "kubevirt-aie-webhook.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubevirt-aie-webhook.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "kubevirt-aie-webhook.fullname" . }}
  namespace: {{ include "kubevirt-aie-webhook.namespace" . }}
