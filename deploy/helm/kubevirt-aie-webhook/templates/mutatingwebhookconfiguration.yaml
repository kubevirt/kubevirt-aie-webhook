apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "kubevirt-aie-webhook.fullname" . }}
  labels:
    {{- include "kubevirt-aie-webhook.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "kubevirt-aie-webhook.namespace" . }}/{{ include "kubevirt-aie-webhook.fullname" . }}-tls
  {{- end }}
webhooks:
- name: virt-launcher-mutator.kubevirt.io
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: {{ include "kubevirt-aie-webhook.fullname" . }}
      namespace: {{ include "kubevirt-aie-webhook.namespace" . }}
      path: /mutate-pods
      port: 443
  objectSelector:
    matchLabels:
      kubevirt.io: virt-launcher
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]
    scope: Namespaced
